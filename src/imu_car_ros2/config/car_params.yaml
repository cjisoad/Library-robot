car_controller:
  ros__parameters:
    serial_port: "/dev/chassis_serial_port"
    baud_rate: 115200
    track_width: 0.72
    wheel_radius: 0.107
    command_scale: 50.0
    max_command: 100
    acceleration_time: 3
    prefer_pivot_turn: true
    pivot_turn_angular_threshold: 0.01
    min_pivot_wheel_speed: 0.08
    feedback_timeout: 0.5
    cmd_vel_topic: "/cmd_vel"
    wheel_speed_topic: "/wheel_speeds"
    joint_state_topic: "/wheel_joint_states"

imu_driver:
  ros__parameters:
    imu_port: "/dev/imu_port"
    imu_baud_rate: 9600
    imu_topic: "/imu/data_raw"
    imu_frame: "imu_link"

car_odometry:
  ros__parameters:
    wheel_speed_topic: "/wheel_speeds"
    joint_state_topic: "/wheel_joint_states"
    imu_topic: "/imu/data_raw"
    odom_topic: "/odom"
    odom_frame: "odom"
    base_frame: "base_link"
    imu_frame: "imu_link"
    publish_tf: true
    use_imu_orientation: true
    use_imu_angular_velocity: true
    track_width: 0.605
    wheel_radius: 0.107
    linear_scale: 0.2605
    angular_scale: 0.2605
    publish_rate: 50.0
    enable_angle_debug: false
    debug_log_period: 0.5
    debug_odom_yaw_topic: "/debug/odom_yaw_deg"
    debug_imu_yaw_topic: "/debug/imu_yaw_deg"
    debug_angular_velocity_topic: "/debug/angular_velocity_deg_s"
    debug_gyro_integrated_yaw_topic: "/debug/gyro_integrated_yaw_deg"
    debug_x_topic: "/debug/odom_x_m"
    debug_y_topic: "/debug/odom_y_m"
    debug_distance_topic: "/debug/odom_distance_m"
