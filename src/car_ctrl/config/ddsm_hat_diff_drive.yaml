ddsm_hat_diff_drive:
  ros__parameters:
    port: /dev/chassis_serial_port
    baudrate: 115200

    # Update these two values to match the chassis geometry.
    wheel_radius: 0.05
    wheel_track: 0.33

    # Motor physical layout: 1=left front, 2=right front, 3=left rear, 4=right rear.
    # The right side is installed in the opposite direction, so forward chassis
    # motion is positive RPM on 1/3 and negative RPM on 2/4.
    motor_ids: [1, 2, 3, 4]
    motor_signs: [1, -1, 1, -1]
    command_order: [2, 1, 3, 4]

    cmd_vel_topic: /cmd_vel
    wheel_speed_topic: /wheel_speeds
    joint_state_topic: /wheel_joint_states
    wheel_speed_source_topic: /wheel_speed_source
    use_motor_feedback: true
    feedback_timeout: 0.5

    max_rpm: 330
    accel_rpm_per_sec: 600.0
    command_rate_hz: 10.0
    cmd_vel_timeout: 0.5

    heartbeat_ms: 1000
    hat_act: 1
    init_hat: true
    log_serial_tx: false
    log_serial_rx: true
    per_motor_command_gap: 0.003
    feedback_log_rate_hz: 0.0

imu_driver:
  ros__parameters:
    imu_port: /dev/imu_port
    imu_baud_rate: 9600
    imu_topic: /imu/data_raw
    imu_frame: imu_link
    read_period: 0.01

car_odometry:
  ros__parameters:
    wheel_speed_topic: /wheel_speeds
    joint_state_topic: /wheel_joint_states
    imu_topic: /imu/data_raw
    odom_topic: /odom
    odom_frame: odom
    base_frame: base_link
    imu_frame: imu_link
    publish_tf: true
    use_imu_orientation: false
    use_imu_angular_velocity: true
    use_wheel_angular_fallback: false

    # Keep these consistent with the controller section.
    wheel_radius: 0.05025
    track_width: 0.72

    linear_scale: 1.0
    angular_scale: 1.0
    imu_angular_velocity_scale: 1.0
    imu_angular_velocity_bias: 0.0
    publish_rate: 50.0
    imu_timeout: 0.5
    imu_error_log_period: 1.0
    enable_angle_debug: false
    debug_log_period: 0.5
    debug_odom_yaw_topic: /debug/odom_yaw_deg
    debug_imu_yaw_topic: /debug/imu_yaw_deg
    debug_angular_velocity_topic: /debug/angular_velocity_deg_s
    debug_gyro_integrated_yaw_topic: /debug/gyro_integrated_yaw_deg
    debug_x_topic: /debug/odom_x_m
    debug_y_topic: /debug/odom_y_m
    debug_distance_topic: /debug/odom_distance_m
